<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kards — Charcoal Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bricolage+Grotesque:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --text: #f0ebe4;
  --bg: #2d2d2d;
}
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.intro-overlay {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: var(--bg);
}
.intro-overlay.hide {
  display: none;
}

.kards-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 51;
  pointer-events: none;
  text-align: center;
}
.kards-text .pc-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -3px;
  color: var(--text);
  line-height: 1;
  opacity: 0;
  animation: introFadeIn 1.2s ease 0.3s forwards;
}
@keyframes introFadeIn {
  0%   { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}
.pc-letter {
  display: inline-block;
  transition: opacity 0.3s ease;
}
.pc-letter.obscured {
  opacity: 0.1;
}
@media (max-width: 768px) {
  .kards-text .pc-name { font-size: 42px; }
}

.parallax-section {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: default;
}

.parallax-scene {
  position: absolute;
  top: -900px;
  left: -900px;
  right: -900px;
  bottom: -900px;
  will-change: transform;
  z-index: 2;
}

.p-card {
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  will-change: transform;
  transition: transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.3s ease, box-shadow 0.5s ease;
  opacity: 0;
}
.p-card.card-visible {
  opacity: 1;
}
.p-card:hover {
  opacity: 0.92 !important;
  z-index: 10;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  transform: scale(1.06) rotate(var(--tilt));
}

.p-card-face {
  position: absolute;
  inset: 0;
  border-radius: 10px;
}
</style>
</head>
<body>

<div class="intro-overlay" id="introOverlay"></div>

<div class="kards-text" id="kardsText">
  <div class="pc-name"><span class="pc-letter">K</span><span class="pc-letter">a</span><span class="pc-letter">r</span><span class="pc-letter">d</span><span class="pc-letter">s</span></div>
</div>

<section class="parallax-section" id="parallaxSection">
  <div class="parallax-scene" id="parallaxScene"></div>
</section>

<script>
(function() {
  var overlay = document.getElementById('introOverlay');
  var kardsText = document.getElementById('kardsText');
  var scene = document.getElementById('parallaxScene');
  if (!scene) return;

  var OFFSET = 900;

  var cards = [
    // ══════════════════════════════════════
    //  14 VISIBLE CARDS — Charcoal theme (vibrant pops on dark)
    // ══════════════════════════════════════

    // -- Top edge --
    { w: 240, h: 280, x: 10,  y: -10, bg: '#e8685a' },
    { w: 300, h: 200, x: 42,  y: -6,  bg: '#a0d2db' },
    { w: 260, h: 240, x: 74,  y: -8,  bg: '#f0c27f' },

    // -- Left edge --
    { w: 150, h: 220, x: -6,  y: 18,  bg: '#c8a2c8' },
    { w: 140, h: 200, x: -5,  y: 50,  bg: '#7eb8a0' },

    // -- Main area --
    { w: 350, h: 300, x: 10,  y: 26,  bg: '#d4a574' },
    { w: 300, h: 260, x: 44,  y: 12,  bg: '#b8d4e3' },

    // -- Right side --
    { w: 380, h: 380, x: 60,  y: 28,  bg: '#f5d6c8' },
    { w: 180, h: 260, x: 90,  y: 18,  bg: '#e8847a' },

    // -- Lower area --
    { w: 280, h: 310, x: 6,   y: 60,  bg: '#98d1a8' },
    { w: 250, h: 230, x: 82,  y: 54,  bg: '#f0c27f' },

    // -- Bottom edge --
    { w: 360, h: 220, x: 30,  y: 78,  bg: '#a0d2db' },
    { w: 280, h: 200, x: 8,   y: 88,  bg: '#e8685a' },
    { w: 240, h: 220, x: 68,  y: 84,  bg: '#c8a2c8' },

    // ══════════════════════════════════════
    //  HIDDEN LEFT
    // ══════════════════════════════════════
    { w: 300, h: 340, x: -24, y: -6,  bg: '#5a4a3a' },
    { w: 280, h: 270, x: -20, y: 26,  bg: '#6a5a4a' },
    { w: 310, h: 300, x: -26, y: 54,  bg: '#4a5a5a' },
    { w: 270, h: 280, x: -22, y: 80,  bg: '#5a5040' },
    { w: 320, h: 310, x: -44, y: -4,  bg: '#4a4a5a' },
    { w: 290, h: 340, x: -40, y: 28,  bg: '#5a5a4a' },
    { w: 310, h: 270, x: -48, y: 56,  bg: '#6a5040' },
    { w: 280, h: 300, x: -42, y: 82,  bg: '#4a5a4a' },

    // ══════════════════════════════════════
    //  HIDDEN RIGHT
    // ══════════════════════════════════════
    { w: 290, h: 320, x: 108, y: -4,  bg: '#5a5040' },
    { w: 310, h: 280, x: 112, y: 28,  bg: '#6a4a4a' },
    { w: 270, h: 310, x: 106, y: 56,  bg: '#4a6a5a' },
    { w: 300, h: 270, x: 110, y: 82,  bg: '#5a5a50' },
    { w: 320, h: 300, x: 128, y: -2,  bg: '#5a4a5a' },
    { w: 290, h: 330, x: 132, y: 30,  bg: '#6a5a48' },
    { w: 310, h: 280, x: 126, y: 58,  bg: '#4a5060' },
    { w: 280, h: 310, x: 130, y: 84,  bg: '#5a5a48' },

    // ══════════════════════════════════════
    //  HIDDEN TOP
    // ══════════════════════════════════════
    { w: 300, h: 270, x: -2,  y: -28, bg: '#5a5048' },
    { w: 270, h: 250, x: 26,  y: -24, bg: '#6a5840' },
    { w: 310, h: 280, x: 52,  y: -30, bg: '#4a5a50' },
    { w: 280, h: 260, x: 78,  y: -26, bg: '#5a5040' },
    { w: 320, h: 300, x: 0,   y: -50, bg: '#585050' },
    { w: 280, h: 280, x: 28,  y: -48, bg: '#4a5a48' },
    { w: 300, h: 270, x: 54,  y: -52, bg: '#505060' },
    { w: 290, h: 290, x: 80,  y: -50, bg: '#5a5848' },

    // ══════════════════════════════════════
    //  HIDDEN BOTTOM
    // ══════════════════════════════════════
    { w: 310, h: 280, x: -2,  y: 110, bg: '#5a5048' },
    { w: 280, h: 270, x: 26,  y: 114, bg: '#6a5a48' },
    { w: 300, h: 290, x: 52,  y: 108, bg: '#4a5050' },
    { w: 270, h: 300, x: 78,  y: 112, bg: '#5a5a48' },
    { w: 290, h: 310, x: 0,   y: 132, bg: '#5a4a50' },
    { w: 320, h: 280, x: 28,  y: 136, bg: '#4a5a50' },
    { w: 280, h: 300, x: 54,  y: 130, bg: '#6a5048' },
    { w: 310, h: 270, x: 80,  y: 134, bg: '#5a5848' },

    // ══════════════════════════════════════
    //  HIDDEN CORNERS
    // ══════════════════════════════════════
    { w: 280, h: 270, x: -30, y: -32, bg: '#504848' },
    { w: 300, h: 280, x: 120, y: -30, bg: '#4a5858' },
    { w: 270, h: 300, x: -28, y: 114, bg: '#584a50' },
    { w: 290, h: 280, x: 122, y: 112, bg: '#4a5850' },
  ];

  var cardEls = [];
  cards.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'p-card';
    el.style.cssText =
      'width:' + c.w + 'px;height:' + c.h + 'px;' +
      'left:calc(' + c.x + 'vw + ' + OFFSET + 'px);' +
      'top:calc(' + c.y + 'vh + ' + OFFSET + 'px);';

    var angle = (10 + Math.random() * 8) * (Math.random() < 0.5 ? -1 : 1);
    el.style.setProperty('--tilt', angle.toFixed(1) + 'deg');

    el.addEventListener('click', function() {
      window.location.href = 'home.html';
    });

    var face = document.createElement('div');
    face.className = 'p-card-face';
    face.style.background = c.bg;
    el.appendChild(face);

    scene.appendChild(el);
    cardEls.push(el);
  });

  setTimeout(function() {
    overlay.classList.add('hide');
    kardsText.style.zIndex = '1';

    cardEls.forEach(function(el, i) {
      var delay = 100 + Math.random() * 600;
      el.style.transition = 'opacity 0.6s ease ' + delay + 'ms, transform 0.6s cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 0.5s ease';
      el.classList.add('card-visible');
    });
  }, 2000);

  var targetX = 0, targetY = 0;
  var currentX = 0, currentY = 0;
  var prevMX = null, prevMY = null;
  var SENSITIVITY = 0.35;
  var LERP = 0.09;
  var MAX = 780;

  document.addEventListener('mousemove', function(e) {
    if (prevMX !== null) {
      targetX -= (e.clientX - prevMX) * SENSITIVITY;
      targetY -= (e.clientY - prevMY) * SENSITIVITY;
      targetX = Math.max(-MAX, Math.min(MAX, targetX));
      targetY = Math.max(-MAX, Math.min(MAX, targetY));
    }
    prevMX = e.clientX;
    prevMY = e.clientY;
  });

  var letters = document.querySelectorAll('.pc-letter');
  var allCards = document.querySelectorAll('.p-card');

  function rectsOverlap(a, b) {
    return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
  }

  function checkOverlap() {
    for (var l = 0; l < letters.length; l++) {
      var lr = letters[l].getBoundingClientRect();
      var hit = false;
      for (var i = 0; i < allCards.length; i++) {
        if (rectsOverlap(lr, allCards[i].getBoundingClientRect())) {
          hit = true;
          break;
        }
      }
      if (hit) {
        letters[l].classList.add('obscured');
      } else {
        letters[l].classList.remove('obscured');
      }
    }
  }

  function tick() {
    currentX += (targetX - currentX) * LERP;
    currentY += (targetY - currentY) * LERP;
    scene.style.transform = 'translate(' + currentX + 'px,' + currentY + 'px)';
    checkOverlap();
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

</body>
</html>
