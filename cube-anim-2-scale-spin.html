<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Cube Animation 2 - Scale + Spin In</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
.label { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: #555; font-family: sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; }

.cube-scene {
  width: 500px; height: 500px;
  perspective: 1200px;
}
.cube {
  width: 400px; height: 400px;
  position: relative;
  transform-style: preserve-3d;
  margin: 50px auto;
  transform: rotateX(-20deg) rotateY(-30deg) scale(0);
  opacity: 0;
}
.cube-face {
  position: absolute;
  width: 400px; height: 400px;
  border: 1px solid rgba(255,255,255,0.15);
  background:
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.08) 49px, rgba(255,255,255,0.08) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.08) 49px, rgba(255,255,255,0.08) 50px);
  left: 0; top: 0;
}
.cube-front  { transform: translateZ(200px); }
.cube-back   { transform: translateZ(-200px); }
.cube-left   { transform: rotateY(-90deg) translateZ(200px); }
.cube-right  { transform: rotateY(90deg) translateZ(200px); }
.cube-top    { transform: rotateX(90deg) translateZ(200px); }
.cube-bottom { transform: rotateX(-90deg) translateZ(200px); }

.cube-card {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 6px;
  transform-style: preserve-3d;
}
.c1 { background: rgba(150,140,170,0.85); top: 40px; left: 40px; transform: translateZ(30px); }
.c2 { background: rgba(200,180,165,0.85); top: 40px; left: 240px; transform: translateZ(-80px); }
.c3 { background: rgba(210,230,215,0.85); top: 160px; left: 140px; transform: translateZ(60px); }
.c4 { background: rgba(160,110,85,0.85); top: 280px; left: 40px; transform: translateZ(-40px); }
.c5 { background: rgba(200,195,175,0.85); top: 280px; left: 240px; transform: translateZ(100px); }
.c6 { background: rgba(120,150,190,0.85); top: 160px; left: 300px; transform: translateZ(-100px); }
</style>
</head>
<body>
<div class="label">2 / 6 &mdash; Scale + Spin In (dramatic entrance)</div>
<div class="cube-scene">
  <div class="cube" id="cube">
    <div class="cube-face cube-front"></div>
    <div class="cube-face cube-back"></div>
    <div class="cube-face cube-left"></div>
    <div class="cube-face cube-right"></div>
    <div class="cube-face cube-top"></div>
    <div class="cube-face cube-bottom"></div>
    <div class="cube-card c1"></div>
    <div class="cube-card c2"></div>
    <div class="cube-card c3"></div>
    <div class="cube-card c4"></div>
    <div class="cube-card c5"></div>
    <div class="cube-card c6"></div>
  </div>
</div>
<script>
var cube = document.getElementById('cube');
var rotX = -20, rotY = -30;
var startTime = performance.now();
var introDuration = 1800;
var startRotY = -30 - 360;

function animate(now) {
  var elapsed = now - startTime;

  if (elapsed < introDuration) {
    var p = elapsed / introDuration;
    var ease = 1 - Math.pow(1 - p, 4); // easeOutQuart

    var scale = ease * 1;
    var currentRotY = startRotY + (rotY - startRotY) * ease;
    var opacity = Math.min(p / 0.2, 1);

    cube.style.opacity = opacity;
    cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + currentRotY + 'deg) scale(' + scale + ')';
  } else {
    rotY += 0.05;
    cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) scale(1)';
    cube.style.opacity = '1';
  }

  requestAnimationFrame(animate);
}

setTimeout(function() {
  requestAnimationFrame(animate);
}, 300);
</script>
</body></html>
