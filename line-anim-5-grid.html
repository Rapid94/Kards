<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Animation 5 — Grid Expand</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 26px 140px 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: #000;
}
.nav-logo {
  font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
  opacity: 0; transform: translateY(-30px);
}
.nav-logo.animate { animation: slideDown 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; }
.nav-right {
  display: flex; gap: 32px; align-items: center;
  opacity: 0; transform: translateY(-30px);
}
.nav-right.animate { animation: slideDown 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards; }
.nav-right a { font-size: 15px; font-weight: 500; color: #888; text-decoration: none; }
.nav-right .btn-launch {
  padding: 11px 32px; font-size: 18px; font-weight: 800;
  border: 1px solid #555; color: #fff; background: #000;
}

/* Lines — positioned via JS for grid expand */
.deco-line {
  position: fixed;
  background: rgba(255,255,255,0.2);
  z-index: 99;
}

/* Hero Content */
.hero { padding: 200px 64px 80px 140px; }
.hero-tagline {
  font-size: 16px; font-weight: 600; color: #888; letter-spacing: 0.5px; margin-bottom: 20px;
  opacity: 0; transform: translateX(-60px);
}
.hero-tagline.animate { animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards; }
.hero-heading {
  font-size: 72px; font-weight: 800; letter-spacing: -3px; line-height: 1.08;
  max-width: 700px; margin-bottom: 24px;
  opacity: 0; transform: translateX(-60px);
}
.hero-heading.animate { animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards; }
.hero-sub {
  font-size: 18px; color: #888; line-height: 1.6; max-width: 500px;
  opacity: 0; transform: translateX(-60px);
}
.hero-sub.animate { animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards; }

@keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
@keyframes slideLeft { to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<!-- Lines will be animated via JS -->
<div class="deco-line" id="line-h"></div>
<div class="deco-line" id="line-v1"></div>
<div class="deco-line" id="line-v2"></div>
<div class="deco-line" id="line-v3"></div>
<div class="deco-line" id="line-v4"></div>

<nav class="navbar">
  <div class="nav-logo">Kards</div>
  <div class="nav-right">
    <a href="#">Pricing</a>
    <div class="btn-launch">Launch App</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-tagline">No Designer<span style="font-family:'Source Serif 4',serif;font-style:italic">?</span> No Problem.</div>
  <h1 class="hero-heading">Effortless Social Media</h1>
  <p class="hero-sub">Turn your Google reviews into beautiful, branded social media graphics in seconds.</p>
</section>

<script>
function gridExpand() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cx = vw / 2;
  const cy = vh / 2;

  const lineH = document.getElementById('line-h');
  const lineV1 = document.getElementById('line-v1');
  const lineV2 = document.getElementById('line-v2');
  const lineV3 = document.getElementById('line-v3');
  const lineV4 = document.getElementById('line-v4');

  // Final positions
  const finalH = { top: 105, left: 0, width: vw, height: 1 };
  const finals = [
    { el: lineV1, left: 64,       top: 105, width: 1, height: vh - 105 },
    { el: lineV2, left: 84,       top: 105, width: 1, height: vh - 105 },
    { el: lineV3, left: vw - 65,  top: 105, width: 1, height: vh - 105 },
    { el: lineV4, left: vw - 85,  top: 105, width: 1, height: vh - 105 },
  ];

  // Start positions — small cross in center
  const startSize = 40; // px
  const startH = { top: cy, left: cx - startSize / 2, width: startSize, height: 1 };
  const startV = finals.map(() => ({
    left: cx, top: cy - startSize / 2, width: 1, height: startSize
  }));

  // Set initial positions
  function applyRect(el, r) {
    el.style.top = r.top + 'px';
    el.style.left = r.left + 'px';
    el.style.width = r.width + 'px';
    el.style.height = r.height + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
  }

  applyRect(lineH, startH);
  finals.forEach((f, i) => applyRect(f.el, startV[i]));

  const duration = 1400;
  const ease = t => {
    // Custom ease-out expo
    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
  };

  function lerp(a, b, t) { return a + (b - a) * t; }

  const start = performance.now();

  function step(now) {
    const elapsed = now - start;
    const rawT = Math.min(elapsed / duration, 1);
    const t = ease(rawT);

    // Animate horizontal line
    applyRect(lineH, {
      top: lerp(startH.top, finalH.top, t),
      left: lerp(startH.left, finalH.left, t),
      width: lerp(startH.width, finalH.width, t),
      height: 1
    });

    // Animate vertical lines
    finals.forEach((f, i) => {
      applyRect(f.el, {
        left: lerp(startV[i].left, f.left, t),
        top: lerp(startV[i].top, f.top, t),
        width: 1,
        height: lerp(startV[i].height, f.height, t)
      });
    });

    if (rawT < 1) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);

  // Trigger text animations (slightly delayed so lines start first)
  document.querySelectorAll('.nav-logo, .nav-right, .hero-tagline, .hero-heading, .hero-sub').forEach(el => {
    el.classList.add('animate');
  });
}

setTimeout(gridExpand, 200);
</script>
</body>
</html>
