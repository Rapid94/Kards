<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Cube Animation 6 - Glitch Materialize</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
.label { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: #555; font-family: sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; }

.cube-scene {
  width: 500px; height: 500px;
  perspective: 1200px;
}
.cube {
  width: 400px; height: 400px;
  position: relative;
  transform-style: preserve-3d;
  margin: 50px auto;
  opacity: 0;
}
.cube-face {
  position: absolute;
  width: 400px; height: 400px;
  border: 1px solid rgba(255,255,255,0.15);
  background:
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.08) 49px, rgba(255,255,255,0.08) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.08) 49px, rgba(255,255,255,0.08) 50px);
  left: 0; top: 0;
}
.cube-front  { transform: translateZ(200px); }
.cube-back   { transform: translateZ(-200px); }
.cube-left   { transform: rotateY(-90deg) translateZ(200px); }
.cube-right  { transform: rotateY(90deg) translateZ(200px); }
.cube-top    { transform: rotateX(90deg) translateZ(200px); }
.cube-bottom { transform: rotateX(-90deg) translateZ(200px); }

.cube-card {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 6px;
  transform-style: preserve-3d;
  opacity: 0;
}
.c1 { background: rgba(150,140,170,0.85); top: 40px; left: 40px; transform: translateZ(80px); }
.c2 { background: rgba(200,180,165,0.85); top: 40px; left: 240px; transform: translateZ(-60px); }
.c3 { background: rgba(210,230,215,0.85); top: 160px; left: 140px; transform: translateZ(40px); }
.c4 { background: rgba(160,110,85,0.85); top: 280px; left: 40px; transform: translateZ(-100px); }
.c5 { background: rgba(200,195,175,0.85); top: 280px; left: 240px; transform: translateZ(120px); }
.c6 { background: rgba(120,150,190,0.85); top: 160px; left: 300px; transform: translateZ(-80px); }
</style>
</head>
<body>
<div class="label">6 / 6 &mdash; Glitch Materialize (flickers into existence)</div>
<div class="cube-scene">
  <div class="cube" id="cube">
    <div class="cube-face cube-front"></div>
    <div class="cube-face cube-back"></div>
    <div class="cube-face cube-left"></div>
    <div class="cube-face cube-right"></div>
    <div class="cube-face cube-top"></div>
    <div class="cube-face cube-bottom"></div>
    <div class="cube-card c1"></div>
    <div class="cube-card c2"></div>
    <div class="cube-card c3"></div>
    <div class="cube-card c4"></div>
    <div class="cube-card c5"></div>
    <div class="cube-card c6"></div>
  </div>
</div>
<script>
var cube = document.getElementById('cube');
var cards = document.querySelectorAll('.cube-card');
var rotX = -20, rotY = -30;

// Glitch flicker sequence
var flickerPattern = [
  { time: 300,  opacity: 0.3, duration: 50 },
  { time: 400,  opacity: 0,   duration: 100 },
  { time: 550,  opacity: 0.6, duration: 40 },
  { time: 630,  opacity: 0.1, duration: 80 },
  { time: 780,  opacity: 0.8, duration: 30 },
  { time: 850,  opacity: 0.2, duration: 60 },
  { time: 980,  opacity: 0.9, duration: 50 },
  { time: 1080, opacity: 0.4, duration: 40 },
  { time: 1180, opacity: 1,   duration: 30 },
  { time: 1250, opacity: 0.7, duration: 50 },
  { time: 1380, opacity: 1,   duration: 999 },
];

// Apply glitch with random X offset for that "digital" feel
flickerPattern.forEach(function(f) {
  setTimeout(function() {
    var offsetX = (Math.random() - 0.5) * 8;
    cube.style.opacity = f.opacity;
    cube.style.transform = 'translateX(' + offsetX + 'px) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';

    if (f.opacity < 1) {
      setTimeout(function() {
        cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
      }, f.duration);
    }
  }, f.time);
});

// Cards glitch in individually after cube
cards.forEach(function(card, i) {
  var baseDelay = 1500 + i * 200;
  // Quick flicker
  setTimeout(function() { card.style.opacity = '0.5'; }, baseDelay);
  setTimeout(function() { card.style.opacity = '0'; }, baseDelay + 50);
  setTimeout(function() { card.style.opacity = '0.8'; }, baseDelay + 120);
  setTimeout(function() { card.style.opacity = '0'; }, baseDelay + 150);
  setTimeout(function() { card.style.opacity = '1'; }, baseDelay + 250);
});

// Start auto-rotate after everything materializes
setTimeout(function() {
  function animate() {
    rotY += 0.05;
    cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
    requestAnimationFrame(animate);
  }
  animate();
}, 2800);
</script>
</body></html>
