<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Picker — Kards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Roboto:wght@900&family=Montserrat:wght@900&family=Poppins:wght@900&family=Open+Sans:wght@800&family=Playfair+Display:wght@900&family=Lato:wght@900&family=Raleway:wght@900&family=DM+Sans:wght@800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #f2f0e9;
  min-height: 100vh;
  padding: 60px 40px;
}
h1 {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: #888;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 50px;
}
.grid {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 48px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
  border: 2px solid transparent;
}
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 12px 40px rgba(0,0,0,0.1);
}
.card.selected {
  border-color: #e8685a;
  box-shadow: 0 0 0 4px rgba(232,104,90,0.15);
}
.card .number {
  font-size: 13px;
  font-weight: 600;
  color: #bbb;
  letter-spacing: 1px;
}
.card .kards {
  font-size: 72px;
  color: #1a1a1a;
  letter-spacing: -3px;
  line-height: 1;
}
.card .font-name {
  font-size: 14px;
  font-weight: 500;
  color: #999;
  font-family: 'Inter', sans-serif;
}

@media (max-width: 700px) {
  .grid { grid-template-columns: 1fr; }
  .card .kards { font-size: 48px; }
  body { padding: 40px 16px; }
}
</style>
</head>
<body>

<h1>Pick a font for Kards</h1>

<div class="grid">
  <div class="card" onclick="pick(this)">
    <span class="number">01</span>
    <span class="kards" style="font-family:'Inter',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Inter</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">02</span>
    <span class="kards" style="font-family:'Montserrat',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Montserrat</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">03</span>
    <span class="kards" style="font-family:'Poppins',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Poppins</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">04</span>
    <span class="kards" style="font-family:'Roboto',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Roboto</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">05</span>
    <span class="kards" style="font-family:'DM Sans',sans-serif;font-weight:800">Kards</span>
    <span class="font-name">DM Sans</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">06</span>
    <span class="kards" style="font-family:'Space Grotesk',sans-serif;font-weight:700">Kards</span>
    <span class="font-name">Space Grotesk</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">07</span>
    <span class="kards" style="font-family:'Raleway',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Raleway</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">08</span>
    <span class="kards" style="font-family:'Lato',sans-serif;font-weight:900">Kards</span>
    <span class="font-name">Lato</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">09</span>
    <span class="kards" style="font-family:'Open Sans',sans-serif;font-weight:800">Kards</span>
    <span class="font-name">Open Sans</span>
  </div>
  <div class="card" onclick="pick(this)">
    <span class="number">10</span>
    <span class="kards" style="font-family:'Playfair Display',serif;font-weight:900">Kards</span>
    <span class="font-name">Playfair Display</span>
  </div>
</div>

<script>
function pick(el) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
}
</script>

</body>
</html>
