<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Animation 1 — Draw In</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 26px 140px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #000;
}
.nav-logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  opacity: 0;
  transform: translateY(-30px);
}
.nav-logo.animate {
  animation: slideDown 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.075s forwards;
}
.nav-right {
  display: flex; gap: 32px; align-items: center;
  opacity: 0;
  transform: translateY(-30px);
}
.nav-right.animate {
  animation: slideDown 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
}
.nav-right a {
  font-size: 15px; font-weight: 500; color: #888; text-decoration: none;
}
.nav-right .btn-launch {
  padding: 11px 32px;
  font-size: 18px;
  font-weight: 800;
  border: 1px solid #555;
  color: #fff;
  background: #000;
}

/* Decorative Lines */
.deco-line-h {
  position: fixed;
  left: 0; right: 0;
  top: 105px;
  height: 1px;
  background: rgba(255,255,255,0.2);
  z-index: 99;
  transform: scaleX(0);
}
.deco-line-h.animate {
  animation: drawH 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
}
@keyframes drawH {
  to { transform: scaleX(1); }
}

.deco-line-v {
  position: fixed;
  top: 105px; bottom: 0;
  width: 1px;
  background: rgba(255,255,255,0.2);
  z-index: 99;
  transform-origin: top center;
  transform: scaleY(0);
}
.deco-line-v1 { left: 64px; }
.deco-line-v2 { left: 84px; }
.deco-line-v3 { right: 64px; }
.deco-line-v4 { right: 84px; }

.deco-line-v1.animate { animation: drawV 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards; }
.deco-line-v2.animate { animation: drawV 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards; }
.deco-line-v3.animate { animation: drawV 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.40s forwards; }
.deco-line-v4.animate { animation: drawV 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.50s forwards; }

@keyframes drawV {
  to { transform: scaleY(1); }
}

/* Hero Content */
.hero {
  padding: 200px 64px 80px 140px;
}
.hero-tagline {
  font-size: 16px;
  font-weight: 600;
  color: #888;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateX(-60px);
}
.hero-tagline.animate {
  animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
}
.hero-heading {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -3px;
  line-height: 1.08;
  max-width: 700px;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateX(-60px);
}
.hero-heading.animate {
  animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
}
.hero-sub {
  font-size: 18px;
  color: #888;
  line-height: 1.6;
  max-width: 500px;
  opacity: 0;
  transform: translateX(-60px);
}
.hero-sub.animate {
  animation: slideLeft 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
}

@keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
@keyframes slideLeft { to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<div class="deco-line-h"></div>
<div class="deco-line-v deco-line-v1"></div>
<div class="deco-line-v deco-line-v2"></div>
<div class="deco-line-v deco-line-v3"></div>
<div class="deco-line-v deco-line-v4"></div>

<nav class="navbar">
  <div class="nav-logo">Kards</div>
  <div class="nav-right">
    <a href="#">Pricing</a>
    <div class="btn-launch">Launch App</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-tagline">No Designer<span style="font-family:'Source Serif 4',serif;font-style:italic">?</span> No Problem.</div>
  <h1 class="hero-heading">Effortless Social Media</h1>
  <p class="hero-sub">Turn your Google reviews into beautiful, branded social media graphics in seconds.</p>
</section>

<script>
setTimeout(() => {
  document.querySelectorAll('.deco-line-h, .deco-line-v, .nav-logo, .nav-right, .hero-tagline, .hero-heading, .hero-sub').forEach(el => {
    el.classList.add('animate');
  });
}, 200);
</script>
</body>
</html>
